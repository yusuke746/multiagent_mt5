    analysis_interval_days: 3

  # --- Industrials ---
  - ticker: "CAT"
    mt5_symbol: "Caterpillar"
    sector: "industrials"
    sub_industry: "machinery"
    volume_min: 0.02
    volume_step: 0.01
    analysis_interval_days: 3

  # --- Energy ---
  - ticker: "XOM"
    mt5_symbol: "ExxonMobil"
    sector: "energy"
    sub_industry: "integrated_oil"
    volume_min: 0.05
    volume_step: 0.01
